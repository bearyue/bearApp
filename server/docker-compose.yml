services:
  postgres:
    image: postgres:16-alpine
    container_name: bear-asset-db
    environment:
      POSTGRES_DB: bear_asset
      POSTGRES_USER: bear
      POSTGRES_PASSWORD: bear123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bear -d bear_asset"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: bear-asset-server
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/bear_asset
      SPRING_DATASOURCE_USERNAME: bear
      SPRING_DATASOURCE_PASSWORD: bear123
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
